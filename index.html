<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Anak Sholeh - Interaktif</title>
    <!-- Library pendukung -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .arabic-font { font-family: 'Traditional Arabic', 'Sakkal Majalla', serif; font-size: 2.5rem; }
        /* Animasi loading sederhana */
        .dot-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Key Anda
        const apiKey = "AIzaSyCr2iyR49HL3hm94LrLkk_J_AUb37wd5_c"; 

        function App() {
            const [query, setQuery] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [imageUrl, setImageUrl] = useState(null);
            const [error, setError] = useState(null);

            // Fungsi fetch dengan penanganan error yang lebih baik
            const fetchWithRetry = async (url, options, retries = 3) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, 1000));
                        return fetchWithRetry(url, options, retries - 1);
                    }
                    throw err;
                }
            };

            const handleTranslate = async () => {
                if (!query.trim()) return;
                
                setLoading(true);
                setError(null);
                setResult(null);
                setImageUrl(null);

                const systemPrompt = `You are an Arabic-Indonesian dictionary expert for children. 
                Return strictly VALID JSON: 
                {
                  "word": "Arabic word with harakat", 
                  "indo_term": "Indonesian meaning", 
                  "type": "Noun/Verb", 
                  "sentences": [{"arabic": "simple sentence", "indo": "translation"}], 
                  "image_prompt": "cute cartoon illustration of [word], islamic style, simple, bright colors"
                }`;

                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Terjemahkan kata ini ke Arab/Indo: ${query}` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    temperature: 0.7
                                }
                            })
                        }
                    );

                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const parsedResult = JSON.parse(data.candidates[0].content.parts[0].text);
                        setResult(parsedResult);
                        handleGenerateImage(parsedResult.image_prompt);
                    } else {
                        throw new Error("Format data AI tidak sesuai.");
                    }
                } catch (err) {
                    console.error("Translate error:", err);
                    setError("Waduh! Ada masalah saat mencari kata. Coba lagi ya!");
                    setLoading(false);
                }
            };

            const handleGenerateImage = async (prompt) => {
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt: prompt },
                                parameters: { sampleCount: 1 }
                            })
                        }
                    );
                    const data = await response.json();
                    if (data.predictions && data.predictions[0]) {
                        setImageUrl(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                    }
                } catch (err) {
                    console.error("Image error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const playAudio = (text, isArabic = false) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = isArabic ? 'ar-SA' : 'id-ID';
                ut.rate = 0.8;
                window.speechSynthesis.speak(ut);
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [result, loading, error]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-10">
                            <div className="inline-block bg-emerald-600 p-4 rounded-3xl shadow-lg mb-4 text-white">
                                <i data-lucide="languages" className="w-10 h-10"></i>
                            </div>
                            <h1 className="text-4xl font-extrabold text-slate-900">Kamus Anak Sholeh</h1>
                            <p className="text-slate-500 mt-2 font-medium italic">Belajar Bahasa Arab Jadi Seru!</p>
                        </header>

                        <div className="relative mb-10 flex gap-2">
                            <input
                                type="text"
                                className="flex-1 p-5 rounded-2xl border-2 border-white bg-white shadow-lg focus:border-emerald-500 outline-none transition-all text-lg"
                                placeholder="Cari kata (Contoh: Buku, Kitab, Kursi...)"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleTranslate()}
                            />
                            <button
                                onClick={handleTranslate}
                                disabled={loading}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 rounded-2xl font-bold flex items-center gap-2 transition-all active:scale-95 disabled:bg-slate-300"
                            >
                                {loading ? <i data-lucide="loader-2" className="animate-spin w-6 h-6"></i> : "Cari"}
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-50 text-red-600 p-6 rounded-2xl mb-6 text-center border border-red-100 animate-bounce">
                                {error}
                            </div>
                        )}

                        {loading && !result && (
                            <div className="text-center py-20">
                                <div className="text-emerald-600 font-bold text-xl dot-pulse">Sedang mencari ilmu... 📖</div>
                            </div>
                        )}

                        {result && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-500">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                                        <div className="flex-1 text-center md:text-left">
                                            <div className="inline-block px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">
                                                {result.type}
                                            </div>
                                            <h2 className="font-bold text-emerald-600 mb-2 arabic-font leading-normal" dir="rtl">
                                                {result.word}
                                            </h2>
                                            <p className="text-3xl text-slate-500 font-bold mb-6 capitalize">{result.indo_term}</p>
                                            <button 
                                                onClick={() => playAudio(result.word, true)} 
                                                className="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 mx-auto md:mx-0 transition-colors"
                                            >
                                                <i data-lucide="volume-2" className="w-5 h-5"></i> Dengar Suara
                                            </button>
                                        </div>
                                        <div className="w-52 h-52 bg-slate-50 rounded-[2.5rem] overflow-hidden shadow-inner flex items-center justify-center border-4 border-white">
                                            {imageUrl ? (
                                                <img src={imageUrl} className="w-full h-full object-cover shadow-sm" alt="Ilustrasi" />
                                            ) : (
                                                <div className="text-center p-4">
                                                    <i data-lucide="image" className="w-12 h-12 text-slate-200 mx-auto mb-2"></i>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Menggambar...</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                        <h3 className="font-bold text-xl mb-6 flex items-center gap-2"><i data-lucide="book-open" className="text-emerald-600"></i> Contoh Kalimat</h3>
                                        <div className="space-y-4">
                                            {result.sentences && result.sentences.map((s, i) => (
                                                <div key={i} className="p-6 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-emerald-50/20 transition-all group">
                                                    <div className="flex justify-between items-start gap-4">
                                                        <button onClick={() => playAudio(s.arabic, true)} className="p-2 text-slate-300 hover:text-emerald-600 transition-colors">
                                                            <i data-lucide="volume-2" className="w-5 h-5"></i>
                                                        </button>
                                                        <p className="text-2xl text-right arabic-font flex-1 leading-relaxed" dir="rtl" style={{fontSize: '2rem'}}>
                                                            {s.arabic}
                                                        </p>
                                                    </div>
                                                    <p className="text-slate-500 mt-2 italic font-medium">"{s.indo}"</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-3xl p-8 text-white shadow-xl">
                                        <h3 className="font-bold text-xl mb-4 flex items-center gap-2"><i data-lucide="sparkles" className="text-emerald-200"></i> Tips Hafalan</h3>
                                        <p className="text-emerald-50 text-sm leading-relaxed mb-6 opacity-90">
                                            Ucapkan kata <b>"{result.word}"</b> sebanyak 5 kali sambil membayangkan gambarnya agar lebih cepat hafal!
                                        </p>
                                        <div className="bg-white/10 p-5 rounded-2xl border border-white/20">
                                            <p className="text-[11px] font-bold uppercase tracking-widest text-emerald-200 mb-2">Mutiara Hikmah</p>
                                            <p className="text-xs italic leading-relaxed">
                                                "Menuntut ilmu adalah kewajiban bagi setiap Muslim."
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm text-center">
                                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Status AI</p>
                                        <div className="flex items-center justify-center gap-2 text-emerald-500 font-bold text-xs">
                                            <span className="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                                            Gemini 2.5 Active
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!result && !loading && (
                            <div className="text-center py-20 opacity-40">
                                <i data-lucide="search" className="w-16 h-16 mx-auto text-slate-300 mb-4"></i>
                                <p className="font-bold text-slate-400">Belum ada kata yang dicari</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
