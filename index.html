<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Anak Sholeh - Interaktif</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel untuk menjalankan JSX di browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .arabic-font { font-family: 'Traditional Arabic', 'Sakkal Majalla', serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Key (Kosongkan jika ingin menggunakan sistem runtime Canvas, 
        // atau isi jika ingin dijalankan di hosting sendiri)
        const apiKey = "AIzaSyCr2iyR49HL3hm94LrLkk_J_AUb37wd5_c"; 

        function App() {
            const [query, setQuery] = useState("");
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [imageUrl, setImageUrl] = useState(null);
            const [error, setError] = useState(null);
            const [aiStory, setAiStory] = useState(null); 
            const [aiQuiz, setAiQuiz] = useState(null);
            const [userQuizAnswer, setUserQuizAnswer] = useState("");
            const [quizFeedback, setQuizFeedback] = useState(null);

            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                    throw err;
                }
            };

            const handleTranslate = async () => {
                if (!query.trim()) return;
                setLoading(true);
                setError(null);
                setResult(null);
                setImageUrl(null);
                setAiStory(null);
                setAiQuiz(null);
                setQuizFeedback(null);

                const systemPrompt = `You are an Arabic-Indonesian dictionary expert for children. Analyze the input word. Return JSON: {"word": "Arabic script", "indo_term": "Indonesian term", "translation": "meaning", "type": "Noun/Verb", "sentences": [{"arabic": "...", "indo": "..."}], "image_prompt": "Islamic illustration, simple shapes"}`;

                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Translate: ${query}` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        }
                    );
                    const parsedResult = JSON.parse(data.candidates[0].content.parts[0].text);
                    setResult(parsedResult);
                    handleGenerateImage(parsedResult.image_prompt);
                } catch (err) {
                    setError("Gagal mengambil data. Pastikan API Key terisi jika dijalankan di luar platform.");
                    setLoading(false);
                }
            };

            const handleGenerateImage = async (prompt) => {
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt: prompt },
                                parameters: { sampleCount: 1 }
                            })
                        }
                    );
                    const data = await response.json();
                    if (data.predictions?.[0]) {
                        setImageUrl(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                    }
                } catch (err) {} finally { setLoading(false); }
            };

            const generateAiStory = async () => {
                setAiLoading(true);
                try {
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Buat cerita pendek islami tentang ${result.word} dalam JSON: {"indo": "...", "arabic": "..."}` }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        }
                    );
                    setAiStory(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch (err) {} finally { setAiLoading(false); }
            };

            const playAudio = (text, isArabic = false) => {
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = isArabic ? 'ar-SA' : 'id-ID';
                ut.rate = 0.8;
                window.speechSynthesis.speak(ut);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-10">
                            <div className="inline-block bg-emerald-600 p-4 rounded-3xl shadow-lg mb-4 text-white">
                                <i data-lucide="languages" className="w-10 h-10"></i>
                            </div>
                            <h1 className="text-4xl font-extrabold text-slate-900">Kamus Anak Sholeh</h1>
                            <p className="text-slate-500 mt-2">Belajar Bahasa Al-Qur'an dengan Cerdas</p>
                        </header>

                        <div className="relative mb-10 flex gap-2">
                            <input
                                type="text"
                                className="flex-1 p-5 rounded-2xl border-2 border-white bg-white shadow-lg focus:border-emerald-500 outline-none transition-all"
                                placeholder="Ketik kata Arab atau Indonesia..."
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleTranslate()}
                            />
                            <button
                                onClick={handleTranslate}
                                disabled={loading}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 rounded-2xl font-bold flex items-center gap-2"
                            >
                                {loading ? <i data-lucide="loader-2" className="animate-spin"></i> : "Cari"}
                            </button>
                        </div>

                        {error && <div className="bg-red-50 text-red-600 p-4 rounded-2xl mb-6 text-center">{error}</div>}

                        {result && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                                        <div className="flex-1 text-center md:text-left">
                                            <h2 className="text-6xl font-bold text-emerald-600 mb-2 arabic-font" dir="rtl">{result.word}</h2>
                                            <p className="text-3xl text-slate-500 font-medium mb-4">{result.indo_term}</p>
                                            <button onClick={() => playAudio(result.word, true)} className="bg-slate-100 hover:bg-emerald-100 text-emerald-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 mx-auto md:mx-0">
                                                <i data-lucide="volume-2"></i> Dengar
                                            </button>
                                        </div>
                                        <div className="w-48 h-48 bg-slate-50 rounded-3xl overflow-hidden shadow-inner flex items-center justify-center">
                                            {imageUrl ? <img src={imageUrl} className="w-full h-full object-cover" /> : <i data-lucide="image" className="w-12 h-12 text-slate-200"></i>}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                        <h3 className="font-bold text-xl mb-4 flex items-center gap-2"><i data-lucide="book" className="text-emerald-600"></i> Contoh Kalimat</h3>
                                        <div className="space-y-4">
                                            {result.sentences.map((s, i) => (
                                                <div key={i} className="p-4 rounded-xl bg-slate-50 border border-slate-100">
                                                    <p className="text-2xl text-right arabic-font font-medium" dir="rtl">{s.arabic}</p>
                                                    <p className="text-slate-500 mt-1 italic">"{s.indo}"</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-3xl p-6 text-white shadow-lg">
                                        <h3 className="font-bold mb-4 flex items-center gap-2"><i data-lucide="sparkles"></i> Kisah Pendek</h3>
                                        {aiStory ? (
                                            <div className="space-y-3">
                                                <p className="text-xl text-right arabic-font leading-relaxed" dir="rtl">{aiStory.arabic}</p>
                                                <p className="text-emerald-50 text-sm italic">"{aiStory.indo}"</p>
                                            </div>
                                        ) : (
                                            <button onClick={generateAiStory} disabled={aiLoading} className="w-full py-3 bg-white/20 hover:bg-white/30 rounded-xl font-bold text-sm">
                                                {aiLoading ? "Sedang Membuat..." : "✨ Buat Cerita AI"}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inisialisasi ikon setelah React selesai render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
