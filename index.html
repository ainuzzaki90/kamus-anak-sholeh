<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Anak Sholeh - Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .arabic-font { font-family: 'Traditional Arabic', 'Sakkal Majalla', serif; font-size: 2.5rem; }
        .dot-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const apiKey = ""; // API Key disediakan oleh environment

        // Komponen Icon SVG Manual untuk stabilitas DOM
        const Icons = {
            Languages: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            ),
            Volume2: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            ),
            BookOpen: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            ),
            Sparkles: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            Search: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            ),
            Loader: () => (
                <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
            ),
            Image: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            )
        };

        function App() {
            const [query, setQuery] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [imageUrl, setImageUrl] = useState(null);
            const [error, setError] = useState(null);

            const fetchWithRetry = async (url, options, retries = 5) => {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`Status: ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries) throw err;
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                    }
                }
            };

            const handleTranslate = async () => {
                if (!query.trim()) return;
                
                setLoading(true);
                setError(null);
                setResult(null);
                setImageUrl(null);

                const systemPrompt = `You are an Arabic-Indonesian dictionary expert for children. 
                Return strictly VALID JSON: 
                {
                  "word": "Arabic word with harakat", 
                  "indo_term": "Indonesian meaning", 
                  "type": "Noun/Verb", 
                  "sentences": [{"arabic": "simple sentence", "indo": "translation"}], 
                  "image_prompt": "cute cartoon illustration of [word], islamic style, simple, bright colors"
                }`;

                try {
                    // Menggunakan model gemini-2.5-flash-preview-09-2025 dengan format URL yang benar
                    const data = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Terjemahkan kata ini ke Arab atau Indonesia: ${query}` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { 
                                    responseMimeType: "application/json"
                                }
                            })
                        }
                    );

                    const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (textResponse) {
                        const parsedResult = JSON.parse(textResponse);
                        setResult(parsedResult);
                        handleGenerateImage(parsedResult.image_prompt);
                    } else {
                        throw new Error("Respon AI tidak valid.");
                    }
                } catch (err) {
                    console.error("Translate error:", err);
                    setError("Waduh! Gagal mencari kata. Coba lagi sebentar ya!");
                    setLoading(false);
                }
            };

            const handleGenerateImage = async (prompt) => {
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                instances: { prompt: prompt },
                                parameters: { sampleCount: 1 }
                            })
                        }
                    );
                    const data = await response.json();
                    if (data.predictions?.[0]?.bytesBase64Encoded) {
                        setImageUrl(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                    }
                } catch (err) {
                    console.error("Image error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const playAudio = (text, isArabic = false) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = isArabic ? 'ar-SA' : 'id-ID';
                ut.rate = 0.8;
                window.speechSynthesis.speak(ut);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-10">
                            <div className="inline-block bg-emerald-600 p-4 rounded-3xl shadow-lg mb-4 text-white">
                                <Icons.Languages />
                            </div>
                            <h1 className="text-4xl font-extrabold text-slate-900">Kamus Anak Sholeh</h1>
                            <p className="text-slate-500 mt-2 font-medium italic">Belajar Bahasa Arab Jadi Seru!</p>
                        </header>

                        <div className="relative mb-10 flex gap-2">
                            <input
                                type="text"
                                className="flex-1 p-5 rounded-2xl border-2 border-white bg-white shadow-lg focus:border-emerald-500 outline-none transition-all text-lg"
                                placeholder="Cari kata (Contoh: Buku, Kitab, Kursi...)"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleTranslate()}
                            />
                            <button
                                onClick={handleTranslate}
                                disabled={loading}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 rounded-2xl font-bold flex items-center gap-2 transition-all active:scale-95 disabled:bg-slate-300 min-w-[120px] justify-center"
                            >
                                {loading ? <Icons.Loader /> : "Cari"}
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-50 text-red-600 p-6 rounded-2xl mb-6 text-center border border-red-100">
                                {error}
                            </div>
                        )}

                        {loading && !result && (
                            <div className="text-center py-20">
                                <div className="text-emerald-600 font-bold text-xl dot-pulse">Sedang mencari ilmu... 📖</div>
                            </div>
                        )}

                        {result && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                                        <div className="flex-1 text-center md:text-left">
                                            <div className="inline-block px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-xs font-bold mb-4 uppercase tracking-widest">
                                                {result.type}
                                            </div>
                                            <h2 className="font-bold text-emerald-600 mb-2 arabic-font leading-normal" dir="rtl">
                                                {result.word}
                                            </h2>
                                            <p className="text-3xl text-slate-500 font-bold mb-6 capitalize">{result.indo_term}</p>
                                            <button 
                                                onClick={() => playAudio(result.word, true)} 
                                                className="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 mx-auto md:mx-0 transition-colors"
                                            >
                                                <Icons.Volume2 /> Dengar Suara
                                            </button>
                                        </div>
                                        <div className="w-52 h-52 bg-slate-50 rounded-[2.5rem] overflow-hidden shadow-inner flex items-center justify-center border-4 border-white">
                                            {imageUrl ? (
                                                <img src={imageUrl} className="w-full h-full object-cover shadow-sm" alt="Ilustrasi" />
                                            ) : (
                                                <div className="text-center p-4">
                                                    <div className="text-slate-200 mx-auto mb-2 flex justify-center"><Icons.Image /></div>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Menggambar...</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                        <h3 className="font-bold text-xl mb-6 flex items-center gap-2"><div className="text-emerald-600"><Icons.BookOpen /></div> Contoh Kalimat</h3>
                                        <div className="space-y-4">
                                            {result.sentences && result.sentences.map((s, i) => (
                                                <div key={i} className="p-6 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-emerald-50/20 transition-all">
                                                    <div className="flex justify-between items-start gap-4">
                                                        <button onClick={() => playAudio(s.arabic, true)} className="p-2 text-slate-300 hover:text-emerald-600 transition-colors">
                                                            <Icons.Volume2 />
                                                        </button>
                                                        <p className="text-2xl text-right arabic-font flex-1 leading-relaxed" dir="rtl">
                                                            {s.arabic}
                                                        </p>
                                                    </div>
                                                    <p className="text-slate-500 mt-2 italic font-medium">"{s.indo}"</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-3xl p-8 text-white shadow-xl">
                                        <h3 className="font-bold text-xl mb-4 flex items-center gap-2"><div className="text-emerald-200"><Icons.Sparkles /></div> Tips Hafalan</h3>
                                        <p className="text-emerald-50 text-sm leading-relaxed mb-6 opacity-90">
                                            Ucapkan kata <b>"{result.word}"</b> sebanyak 5 kali sambil membayangkan gambarnya agar lebih cepat hafal!
                                        </p>
                                        <div className="bg-white/10 p-5 rounded-2xl border border-white/20">
                                            <p className="text-[11px] font-bold uppercase tracking-widest text-emerald-200 mb-2">Mutiara Hikmah</p>
                                            <p className="text-xs italic leading-relaxed">
                                                "Menuntut ilmu adalah kewajiban bagi setiap Muslim."
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!result && !loading && (
                            <div className="text-center py-20 opacity-40">
                                <div className="mx-auto text-slate-300 mb-4 flex justify-center"><Icons.Search /></div>
                                <p className="font-bold text-slate-400">Belum ada kata yang dicari</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
